name: CI Quality

on:
  pull_request:
  push:
    branches: [main]

jobs:
  web-quality:
    name: Web | Lint + Typecheck + Tests + Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: web

    env:
      VITE_SANITY_PROJECT_ID: jwpxrdo2
      VITE_SANITY_DATASET: production
      VITE_SANITY_API_VERSION: 2023-01-01
      VITE_DEBUG_SANITY: true
      VITE_ENABLE_ANALYTICS: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test

      - name: Build
        run: npm run build

  studio-quality:
    name: Studio | Lint + Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: studio

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: studio/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  web-performance:
    name: Web | Lighthouse metrics (LCP, CLS, INP)
    runs-on: ubuntu-latest
    needs: web-quality

    env:
      VITE_SANITY_PROJECT_ID: jwpxrdo2
      VITE_SANITY_DATASET: production
      VITE_SANITY_API_VERSION: 2023-01-01
      VITE_DEBUG_SANITY: true
      VITE_ENABLE_ANALYTICS: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Build
        working-directory: web
        run: npm run build

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: ./web/lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true