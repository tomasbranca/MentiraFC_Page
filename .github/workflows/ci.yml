name: CI Quality

on:
  pull_request:
  push:
    branches: [main]

jobs:
  web-quality:
    name: Web | Lint + Typecheck + Tests + Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test

      - name: Build
        run: npm run build

  studio-quality:
    name: Studio | Lint + Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: studio
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: studio/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint


      - name: Build
        run: npm run build

  web-performance:
    name: Web | Lighthouse metrics (LCP, CLS, INP)
    runs-on: ubuntu-latest
    needs: web-quality
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          uploadArtifacts: true
          temporaryPublicStorage: true
          configPath: ./web/lighthouserc.json
