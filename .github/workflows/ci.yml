name: CI Quality

on:
  pull_request:
  push:
    branches: [main]

jobs:
  web-quality:
    name: Web | Lint + Typecheck + Tests + Build
    runs-on: ubuntu-latest

    env:
      VITE_SANITY_PROJECT_ID: jwpxrdo2
      VITE_SANITY_DATASET: production
      VITE_SANITY_API_VERSION: 2023-01-01
      VITE_DEBUG_SANITY: true
      VITE_ENABLE_ANALYTICS: false

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.34.1

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm --dir web lint

      - name: Typecheck
        run: pnpm --dir web typecheck

      - name: Unit tests
        run: pnpm --dir web test

      - name: Build
        run: pnpm --dir web build

  studio-quality:
    name: Studio | Lint + Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.34.1

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm --dir studio lint

      - name: Build
        run: pnpm --dir studio build

  web-performance:
    name: Web | Lighthouse metrics (LCP, CLS, INP)
    runs-on: ubuntu-latest
    needs: web-quality

    env:
      VITE_SANITY_PROJECT_ID: jwpxrdo2
      VITE_SANITY_DATASET: production
      VITE_SANITY_API_VERSION: 2023-01-01
      VITE_DEBUG_SANITY: true
      VITE_ENABLE_ANALYTICS: false

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.34.1

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm --dir web build

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: ./web/lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true
